<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon menu de la semaine — Générateur famille</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🍽️ Mon menu de la semaine</h1>
    <p class="subtitle">Recettes de saison, équilibrées, faciles à préparer en famille</p>
  </header>

  <form id="generator-form">
    <div class="audience-block">
      <label class="audience-label">Pour qui ?</label>
      <div class="audience-options" role="radiogroup">
        <label class="audience-option">
          <input type="radio" name="audience" value="family" checked>
          <span>👨‍👩‍👧 Famille (sans bébé)</span>
        </label>
        <label class="audience-option">
          <input type="radio" name="audience" value="family-baby">
          <span>👨‍👩‍👧‍🍼 Famille + bébé</span>
        </label>
        <label class="audience-option">
          <input type="radio" name="audience" value="baby">
          <span>🍼 Bébé seul</span>
        </label>
      </div>
    </div>

    <div id="baby-birthdate-block" class="baby-birthdate-block" hidden>
      <label>
        Date de naissance du bébé
        <input type="date" id="baby-birthdate">
      </label>
      <div id="baby-age-info" class="baby-age-info"></div>
    </div>

    <div class="row">
      <label>
        Nombre de repas
        <input type="number" id="meals" min="1" max="30" value="5" required>
      </label>
      <label>
        Nombre de personnes
        <input type="number" id="persons" min="1" max="12" value="4" required>
      </label>
    </div>

    <div class="precisions-block">
      <label class="precisions-label">
        Préférences générales (optionnel)
        <span class="precisions-hint">Ce qui change peu — allergies, régime, dégoûts persistants. Sauvegardé automatiquement.</span>
      </label>
      <textarea id="general-prefs" rows="2" placeholder="Ex : sans fruits de mer, on est végétariens, mon mari déteste les champignons..."></textarea>
      <div id="general-prefs-status" class="speech-status"></div>
    </div>

    <div class="precisions-block">
      <label class="precisions-label">
        Précisions du jour (optionnel)
        <span class="precisions-hint">Ce que tu veux pour CETTE semaine. Ex : « 1 quiche, 1 plat avec du riz, au moins 1 fois poulet »</span>
      </label>
      <div class="precisions-input">
        <textarea id="precisions" rows="2" placeholder="Tapez ou cliquez sur le micro pour parler..."></textarea>
        <button type="button" id="mic-btn" title="Parler" aria-label="Activer le micro">🎤</button>
      </div>
      <div id="speech-status" class="speech-status"></div>
      <div class="presets-row">
        <button type="button" id="preset-save-btn" class="preset-save" title="Enregistrer le texte courant comme préréglage">💾 Enregistrer</button>
        <div id="preset-chips" class="preset-chips"></div>
      </div>
    </div>

    <button type="submit" id="submit-btn">✨ Générer mon menu</button>
  </form>

  <main id="results"></main>

  <footer>
    <p>Recettes par <a href="https://www.cuisinez-pour-bebe.fr/" target="_blank">cuisinez-pour-bebe.fr</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
